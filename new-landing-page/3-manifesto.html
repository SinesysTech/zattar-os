<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Manifesto - Center Aligned Impact</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#633deb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#09090b", // Zinc 950 approximation for dark mode background
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display antialiased">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Radial Gradient Background -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
            <div class="w-[800px] h-[800px] bg-primary/10 rounded-full blur-[120px] opacity-50 dark:opacity-30"></div>
        </div>
        <div class="layout-container flex h-full grow flex-col relative z-10">
            <div class="px-4 md:px-20 lg:px-40 flex flex-1 items-center justify-center py-20">
                <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
                    <p
                        class="text-primary dark:text-primary/80 text-sm font-mono tracking-widest leading-normal pb-6 pt-1 px-4 text-center uppercase">
                        [ O NOSSO CÓDIGO-FONTE ]
                    </p>
                    <h1
                        class="text-slate-900 dark:text-zinc-50 tracking-tight text-[32px] md:text-[48px] lg:text-[56px] font-bold leading-tight px-4 text-center pb-6 pt-6">
                        Acreditamos que a inovação não precisa custar a dignidade humana.
                    </h1>
                    <h2
                        class="text-slate-700 dark:text-zinc-300 tracking-tight text-[24px] md:text-[32px] lg:text-[40px] font-medium leading-snug px-4 text-center pb-8 pt-5 max-w-[800px] mx-auto">
                        Na fronteira da economia digital, defendemos o equilíbrio entre o progresso tecnológico e os
                        direitos trabalhistas.
                    </h2>
                    <p
                        class="text-slate-600 dark:text-zinc-400 text-lg md:text-xl font-normal leading-relaxed pb-3 pt-4 px-4 text-center max-w-[600px] mx-auto flex items-center justify-center gap-2">
                        Reescrevemos as regras do jogo para o futuro do trabalho.
                        <span aria-hidden="true" class="inline-block w-2.5 h-2.5 bg-primary rounded-full mt-1"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
