<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZattarOS — Glass Briefing UI Kit</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800&family=Manrope:wght@500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: var(--font-sans);
    color: var(--foreground);
    background: var(--background);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.87 0.01 281 / 0.7); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Ambient backdrop wash */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      radial-gradient(900px 600px at 85% 0%, oklch(0.48 0.26 281 / 0.05), transparent 60%),
      radial-gradient(700px 500px at 0% 100%, oklch(0.60 0.22 45 / 0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script type="text/babel" data-presets="react" src="shared.jsx"></script>
<script type="text/babel" data-presets="react" src="Primitives.jsx"></script>
<script type="text/babel" data-presets="react" src="Sidebar.jsx"></script>
<script type="text/babel" data-presets="react" src="Topbar.jsx"></script>
<script type="text/babel" data-presets="react" src="KpiCard.jsx"></script>
<script type="text/babel" data-presets="react" src="ProcessCard.jsx"></script>
<script type="text/babel" data-presets="react" src="CalendarWidget.jsx"></script>
<script type="text/babel" data-presets="react" src="PulseStrip.jsx"></script>
<script type="text/babel" data-presets="react" src="ChatPanel.jsx"></script>
<script type="text/babel" data-presets="react" src="App.jsx"></script>
</body>
</html>
