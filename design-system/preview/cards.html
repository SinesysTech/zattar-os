<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cards · Processo & KPI</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 20px; gap: 14px; }
  .stage-wrap {
    position: relative;
    border-radius: 16px;
    padding: 18px;
    background:
      radial-gradient(600px at 100% 0%, oklch(0.48 0.26 281 / 0.10), transparent 60%),
      linear-gradient(180deg, oklch(0.98 0.005 281), oklch(0.96 0.01 281));
    border: 1px solid oklch(0.87 0.01 281);
  }
  .demo { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; }

  /* Process card */
  .proc {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    transition: all 200ms;
  }
  .proc .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .proc .num { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
  .proc .title { font-family: var(--font-heading); font-weight: 600; font-size: 14px; line-height: 1.3; }
  .proc .chip { padding: 2px 8px; border-radius: 999px; font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; background: oklch(0.48 0.26 281 / 0.12); color: var(--primary); }
  .proc .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
  .proc .meta .k { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted-foreground); }
  .proc .meta .v { font-size: 12px; font-weight: 500; }
  .proc .foot { display: flex; justify-content: space-between; padding-top: 6px; border-top: 1px dashed var(--border); }
  .proc .parties { display: flex; gap: -4px; }
  .proc .avatar { width: 22px; height: 22px; border-radius: 999px; background: var(--primary); color: white; font-size: 9px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card); margin-left: -6px; }
  .proc .avatar:first-child { margin-left: 0; }
  .proc .avatar.ac2 { background: oklch(0.60 0.22 45); }
  .proc .avatar.ac3 { background: oklch(0.55 0.18 145); }

  /* KPI card (glass) */
  .kpi {
    background: rgba(255, 255, 255, 0.70);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.85);
  }
  .kpi .k { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted-foreground); }
  .kpi .v { font-family: var(--font-heading); font-weight: 700; font-size: 28px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .kpi .s { font-size: 11px; color: var(--muted-foreground); display: flex; gap: 6px; align-items: center; }
  .kpi .delta { color: oklch(0.45 0.18 145); font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">CARDS · PROCESSO + KPI</div>
  <div class="stage-wrap">
    <div class="demo">
      <div class="proc">
        <div class="head">
          <div class="col" style="gap: 3px;">
            <span class="num">0001234-56.2024.5.01.0001</span>
            <span class="title">Silva &amp; Cia Ltda vs. Banco Nacional S/A</span>
          </div>
          <span class="chip">ATIVO</span>
        </div>
        <div class="meta">
          <div><div class="k">Tribunal</div><div class="v">TRT1</div></div>
          <div><div class="k">Responsável</div><div class="v">Dra. Ana Ribeiro</div></div>
          <div><div class="k">Próx. prazo</div><div class="v">18/05/2026</div></div>
          <div><div class="k">Valor</div><div class="v mono">R$ 248.500</div></div>
        </div>
        <div class="foot">
          <div class="parties">
            <span class="avatar">AR</span>
            <span class="avatar ac2">BN</span>
            <span class="avatar ac3">LP</span>
          </div>
          <span class="num">há 2 dias</span>
        </div>
      </div>
      <div class="col" style="gap: 10px; justify-content: space-between;">
        <div class="kpi">
          <span class="k">Processos ativos</span>
          <span class="v">128</span>
          <span class="s"><span class="delta">+4</span> desde a última semana</span>
        </div>
        <div class="kpi">
          <span class="k">Prazos em 7 dias</span>
          <span class="v" style="color: oklch(0.50 0.22 25);">7</span>
          <span class="s">2 vencendo em 48h</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
