<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Colors — User palette (18 slots)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .p-grid { display: grid; grid-template-columns: repeat(18, 1fr); gap: 6px; }
  .p { aspect-ratio: 1; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); }
  .labels { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
  .labels > div { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 999px; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">USER PALETTE — 18 slots</div>
  <div style="font-size: 12px; color: var(--muted-foreground);">Espaçada cromaticamente (L ≈ 0.65, C ≈ 0.18). Usada em tags, labels, cores de evento, seletores.</div>
  <div class="p-grid">
    <div class="p" style="background: var(--palette-1);"></div>
    <div class="p" style="background: var(--palette-2);"></div>
    <div class="p" style="background: var(--palette-3);"></div>
    <div class="p" style="background: var(--palette-4);"></div>
    <div class="p" style="background: var(--palette-5);"></div>
    <div class="p" style="background: var(--palette-6);"></div>
    <div class="p" style="background: var(--palette-7);"></div>
    <div class="p" style="background: var(--palette-8);"></div>
    <div class="p" style="background: var(--palette-9);"></div>
    <div class="p" style="background: var(--palette-10);"></div>
    <div class="p" style="background: var(--palette-11);"></div>
    <div class="p" style="background: var(--palette-12);"></div>
    <div class="p" style="background: var(--palette-13);"></div>
    <div class="p" style="background: var(--palette-14);"></div>
    <div class="p" style="background: var(--palette-15);"></div>
    <div class="p" style="background: var(--palette-16);"></div>
    <div class="p" style="background: var(--palette-17);"></div>
    <div class="p" style="background: var(--palette-18);"></div>
  </div>
  <div class="labels">
    <div><span class="dot" style="background: var(--palette-1);"></span>1 vermelho</div>
    <div><span class="dot" style="background: var(--palette-4);"></span>4 amarelo</div>
    <div><span class="dot" style="background: var(--palette-7);"></span>7 esmeralda</div>
    <div><span class="dot" style="background: var(--palette-10);"></span>10 azul claro</div>
    <div><span class="dot" style="background: var(--palette-13);"></span>13 violeta</div>
    <div><span class="dot" style="background: var(--palette-16);"></span>16 pink</div>
  </div>
</div>
</body>
</html>
