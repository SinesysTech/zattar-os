<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Brand — Logo</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 28px 32px; justify-content: center; }
  .logo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; }
  .logo-surface {
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px;
    padding: 32px;
    border: 1px solid var(--border);
    min-height: 130px;
  }
  .surface-light { background: var(--card); }
  .surface-dark { background: oklch(0.22 0.01 281); border-color: rgba(255,255,255,0.1); }

  .logo-wordmark {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: 64px;
    letter-spacing: -0.04em;
    display: inline-flex;
    align-items: baseline;
  }
  .logo-light { color: oklch(0.15 0.01 281); }
  .logo-dark  { color: oklch(0.98 0 0); }
  .logo-dot  { color: var(--primary); margin-left: 2px; }

  .caption-row { display: flex; justify-content: space-between; padding-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-surface surface-light">
      <span class="logo-wordmark logo-light">Z<span class="logo-dot">.</span></span>
    </div>
    <div class="logo-surface surface-dark">
      <span class="logo-wordmark logo-dark">Z<span class="logo-dot">.</span></span>
    </div>
  </div>
  <div class="caption-row">
    <span class="eyebrow">LIGHT SURFACE</span>
    <span class="eyebrow">DARK SURFACE · SIDEBAR</span>
  </div>
</div>
</body>
</html>
