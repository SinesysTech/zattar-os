<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .rows { display: flex; flex-direction: column; gap: 14px; }
  .row-btn { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row-btn .eb { min-width: 110px; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.08em; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font-sans);
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 150ms ease-in-out;
    line-height: 1;
  }
  .btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  .btn-primary { background: var(--primary); color: var(--primary-foreground); }
  .btn-primary:hover { background: var(--primary-dim); }

  .btn-secondary { background: var(--secondary); color: var(--secondary-foreground); border-color: var(--border); }
  .btn-secondary:hover { background: oklch(0.93 0.04 281); }

  .btn-ghost { background: transparent; color: var(--foreground); }
  .btn-ghost:hover { background: oklch(0.92 0.01 281 / 0.5); }

  .btn-destructive { background: var(--destructive); color: white; }

  .btn-outline { background: transparent; color: var(--foreground); border-color: var(--border); }
  .btn-outline:hover { background: var(--muted); }

  .btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 8px; }
  .btn-lg { padding: 10px 18px; font-size: 14px; border-radius: 12px; }
  .btn-icon { width: 32px; height: 32px; padding: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">BUTTONS</div>
  <div class="rows">
    <div class="row-btn">
      <span class="eb">variant</span>
      <button class="btn btn-primary"><svg viewBox="0 0 24 24"><path d="M12 5v14m7-7H5"/></svg>Adicionar processo</button>
      <button class="btn btn-secondary">Filtrar</button>
      <button class="btn btn-outline">Cancelar</button>
      <button class="btn btn-ghost">Saiba mais</button>
      <button class="btn btn-destructive">Arquivar</button>
    </div>
    <div class="row-btn">
      <span class="eb">size</span>
      <button class="btn btn-primary btn-sm">Pequeno</button>
      <button class="btn btn-primary">Padrão</button>
      <button class="btn btn-primary btn-lg">Grande</button>
      <button class="btn btn-outline btn-icon"><svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"/></svg></button>
      <button class="btn btn-outline btn-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
    </div>
  </div>
</div>
</body>
</html>
