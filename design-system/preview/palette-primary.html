<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Colors — Primary & Brand</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border-radius: 10px; aspect-ratio: 1.2; border: 1px solid var(--border); position: relative; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; color: white; }
  .sw .tok { font-family: var(--font-mono); font-size: 10px; opacity: 0.95; font-weight: 500; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
  .sw.dark-text { color: oklch(0.15 0.01 281); }
  .two-col { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: center; }
  .hero-sw {
    border-radius: 14px;
    background: var(--primary);
    aspect-ratio: 1.3;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 16px; color: white;
  }
  .hero-sw .lg { font-family: var(--font-heading); font-weight: 700; font-size: 22px; letter-spacing: -0.02em; }
</style>
</head>
<body>
<div class="card">
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <div>
      <div class="eyebrow">PRIMARY · BRAND</div>
      <div style="font-family: var(--font-heading); font-weight: 700; font-size: 18px; margin-top: 2px;">Zattar Purple — hue 281°</div>
    </div>
    <span class="mono" style="font-size: 11px; color: var(--muted-foreground);">oklch(L C 281)</span>
  </div>
  <div class="two-col">
    <div class="hero-sw">
      <span class="eyebrow" style="color: rgba(255,255,255,0.8);">--primary</span>
      <div>
        <div class="lg">#5523EB</div>
        <div class="mono" style="font-size: 10px; opacity: 0.8;">oklch(.48 .26 281)</div>
      </div>
    </div>
    <div class="grid">
      <div class="sw" style="background: oklch(0.98 0.01 281); border-color: var(--border);"><span class="tok dark-text">primary/50</span><span class="hex dark-text">L .98</span></div>
      <div class="sw" style="background: oklch(0.93 0.04 281);"><span class="tok dark-text">primary/200</span><span class="hex dark-text">L .93</span></div>
      <div class="sw" style="background: oklch(0.80 0.12 281);"><span class="tok dark-text">primary/400</span><span class="hex dark-text">L .80</span></div>
      <div class="sw" style="background: oklch(0.60 0.22 281);"><span class="tok">primary/600</span><span class="hex">L .60</span></div>
      <div class="sw" style="background: oklch(0.48 0.26 281); border: 2px solid var(--foreground);"><span class="tok">primary</span><span class="hex">L .48 ◉</span></div>
      <div class="sw" style="background: oklch(0.35 0.24 281);"><span class="tok">primary-dim</span><span class="hex">L .35</span></div>
    </div>
  </div>
  <div class="row" style="gap: 16px;">
    <div style="flex: 1; display: flex; gap: 10px; align-items: center; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--card);">
      <span style="width: 24px; height: 24px; background: oklch(0.60 0.22 45); border-radius: 6px;"></span>
      <div class="col">
        <span class="mono" style="font-size: 11px;">--highlight</span>
        <span class="mono" style="font-size: 10px; color: var(--muted-foreground);">#E67E40 · action orange</span>
      </div>
    </div>
    <div style="flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); display: flex; gap: 10px; align-items: center;">
      <span style="width: 24px; height: 24px; background: var(--primary); border-radius: 999px;"></span>
      <span class="mono" style="font-size: 11px;">ring focus · transparent</span>
    </div>
  </div>
</div>
</body>
</html>
