<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Badges & Chips</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .section { display: flex; flex-direction: column; gap: 8px; }
  .row-c { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .chip {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-sans);
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

  .badge {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-sans);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .entity-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid currentColor;
  }
  .entity-badge span { color: var(--foreground); }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">BADGES · CHIPS</div>
  <div class="section">
    <span class="eyebrow" style="font-size: 9px; opacity: 0.7;">STATUS (PROCESSO)</span>
    <div class="row-c">
      <span class="chip" style="background: oklch(0.48 0.26 281 / 0.12); color: var(--primary);"><span class="dot"></span>EM ANDAMENTO</span>
      <span class="chip" style="background: oklch(0.55 0.18 145 / 0.12); color: oklch(0.35 0.16 145);"><span class="dot"></span>ATIVO</span>
      <span class="chip" style="background: oklch(0.60 0.18 75 / 0.14); color: oklch(0.40 0.17 75);"><span class="dot"></span>SUSPENSO</span>
      <span class="chip" style="background: oklch(0.55 0.22 25 / 0.14); color: oklch(0.45 0.22 25);"><span class="dot"></span>PRAZO VENCIDO</span>
      <span class="chip" style="background: oklch(0.92 0.01 281); color: oklch(0.42 0.01 281);"><span class="dot"></span>ARQUIVADO</span>
    </div>
  </div>
  <div class="section">
    <span class="eyebrow" style="font-size: 9px; opacity: 0.7;">ENTITY (PARTE)</span>
    <div class="row-c">
      <span class="entity-badge" style="color: var(--entity-cliente); background: oklch(0.48 0.26 281 / 0.06);"><span>Cliente</span></span>
      <span class="entity-badge" style="color: var(--entity-parte-contraria); background: oklch(0.60 0.18 75 / 0.08);"><span>Parte contrária</span></span>
      <span class="entity-badge" style="color: var(--entity-terceiro); background: oklch(0.55 0.18 250 / 0.08);"><span>Terceiro</span></span>
      <span class="entity-badge" style="color: var(--entity-representante); background: oklch(0.55 0.18 145 / 0.08);"><span>Representante</span></span>
    </div>
  </div>
  <div class="section">
    <span class="eyebrow" style="font-size: 9px; opacity: 0.7;">TAG · COUNTER · SHORTCUT</span>
    <div class="row-c">
      <span class="badge" style="background: var(--muted); color: var(--muted-foreground);">Trabalhista</span>
      <span class="badge" style="background: var(--muted); color: var(--muted-foreground);">Cível</span>
      <span class="badge" style="background: var(--muted); color: var(--muted-foreground);">Família</span>
      <span class="badge" style="background: var(--primary); color: white;">28</span>
      <span class="kbd">⌘ K</span>
      <span class="kbd">↵</span>
    </div>
  </div>
</div>
</body>
</html>
