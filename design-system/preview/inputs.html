<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Inputs & Forms</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-size: 12px; font-weight: 500; color: var(--foreground); }
  .helper { font-size: 11px; color: var(--muted-foreground); }

  .input, .select {
    width: 100%;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--input);
    background: var(--card);
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--foreground);
    transition: all 150ms;
  }
  .input:focus, .select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px oklch(0.48 0.26 281 / 0.12); }

  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted-foreground); }
  .search-wrap .input { padding-left: 32px; }

  .switch { position: relative; width: 36px; height: 20px; background: var(--muted); border-radius: 999px; flex-shrink: 0; cursor: pointer; }
  .switch.on { background: var(--primary); }
  .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 999px; transition: transform 150ms; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .switch.on::after { transform: translateX(16px); }

  .check-row { display: flex; gap: 10px; align-items: center; }
  .check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); background: var(--card); flex-shrink: 0; position: relative; }
  .check.on { background: var(--primary); border-color: var(--primary); }
  .check.on::after { content: ""; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">INPUTS · FORMS</div>
  <div class="grid">
    <div class="field">
      <label class="lbl">Nº do processo</label>
      <input class="input" value="0001234-56.2024.5.01.0001" style="font-family: var(--font-mono);">
    </div>
    <div class="field">
      <label class="lbl">Tribunal</label>
      <select class="select">
        <option>TRT1 — Tribunal Regional do Trabalho 1ª Região</option>
      </select>
    </div>
    <div class="field">
      <label class="lbl">Buscar</label>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="input" placeholder="Buscar processos, partes, peças…">
      </div>
    </div>
    <div class="field">
      <label class="lbl">Responsável</label>
      <input class="input" value="Dra. Ana Ribeiro" />
      <span class="helper">Advogado titular do caso.</span>
    </div>
  </div>
  <div class="row" style="gap: 20px; padding-top: 4px;">
    <div class="row" style="gap: 10px;">
      <div class="switch on"></div>
      <span style="font-size: 12px;">Notificações</span>
    </div>
    <div class="check-row"><div class="check on"></div><span style="font-size: 12px;">Audiências</span></div>
    <div class="check-row"><div class="check on"></div><span style="font-size: 12px;">Prazos</span></div>
    <div class="check-row"><div class="check"></div><span style="font-size: 12px;">Expedientes</span></div>
  </div>
</div>
</body>
</html>
