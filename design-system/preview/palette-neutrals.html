<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Colors — Neutrals (hue-tinted)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .neutrals { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .ntile { border-radius: 10px; aspect-ratio: 1; border: 1px solid var(--border); position: relative; display: flex; align-items: flex-end; padding: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--foreground); }
  .ntile.dark-tile { color: white; border-color: rgba(255,255,255,0.1); }
  .surface-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .surface-card { padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <div>
      <div class="eyebrow">NEUTRALS</div>
      <div style="font-family: var(--font-heading); font-weight: 700; font-size: 18px; margin-top: 2px;">Micro-tinted hue 281°</div>
    </div>
    <span class="mono" style="font-size: 11px; color: var(--muted-foreground);">chroma 0.005–0.01</span>
  </div>
  <div class="neutrals">
    <div class="ntile" style="background: oklch(1 0 0);">1.00</div>
    <div class="ntile" style="background: oklch(0.98 0.005 281);">0.98</div>
    <div class="ntile" style="background: oklch(0.96 0.01 281);">0.96</div>
    <div class="ntile" style="background: oklch(0.92 0.01 281);">0.92</div>
    <div class="ntile" style="background: oklch(0.87 0.01 281);">0.87</div>
    <div class="ntile dark-tile" style="background: oklch(0.42 0.01 281);">0.42</div>
    <div class="ntile dark-tile" style="background: oklch(0.22 0.01 281);">0.22</div>
    <div class="ntile dark-tile" style="background: oklch(0.15 0.01 281);">0.15</div>
  </div>
  <div class="surface-row">
    <div class="surface-card" style="background: var(--card);">
      <span class="mono" style="font-size: 10px; color: var(--muted-foreground);">--card</span>
      <span style="font-size: 13px; font-weight: 600;">Card surface</span>
    </div>
    <div class="surface-card" style="background: var(--muted);">
      <span class="mono" style="font-size: 10px; color: var(--muted-foreground);">--muted</span>
      <span style="font-size: 13px; font-weight: 600;">Muted</span>
    </div>
    <div class="surface-card" style="background: oklch(0.22 0.01 281); color: white; border-color: transparent;">
      <span class="mono" style="font-size: 10px; opacity: 0.7;">--sidebar</span>
      <span style="font-size: 13px; font-weight: 600;">Sidebar (always dark)</span>
    </div>
  </div>
</div>
</body>
</html>
