<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Colors — Event colors (legal domain)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .events { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .event {
    display: grid;
    grid-template-columns: 4px 44px 1fr auto;
    align-items: center;
    padding: 12px 14px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    gap: 14px;
  }
  .event .bar { width: 4px; height: 36px; border-radius: 4px; }
  .event .ico { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 700; color: white; font-size: 14px; }
  .event .meta { display: flex; flex-direction: column; gap: 2px; }
  .event .meta .t { font-size: 13px; font-weight: 600; color: var(--foreground); }
  .event .meta .s { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
  .event .hit { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">EVENT COLORS · DOMÍNIO JURÍDICO</div>
  <div class="events">
    <div class="event">
      <span class="bar" style="background: var(--event-audiencia);"></span>
      <span class="ico" style="background: var(--event-audiencia);">AU</span>
      <div class="meta"><span class="t">Audiência</span><span class="s">--event-audiencia</span></div>
      <span class="hit">palette-10</span>
    </div>
    <div class="event">
      <span class="bar" style="background: var(--event-expediente);"></span>
      <span class="ico" style="background: var(--event-expediente);">EX</span>
      <div class="meta"><span class="t">Expediente</span><span class="s">--event-expediente</span></div>
      <span class="hit">palette-3</span>
    </div>
    <div class="event">
      <span class="bar" style="background: var(--event-prazo);"></span>
      <span class="ico" style="background: var(--event-prazo);">PZ</span>
      <div class="meta"><span class="t">Prazo</span><span class="s">--event-prazo</span></div>
      <span class="hit">palette-1</span>
    </div>
    <div class="event">
      <span class="bar" style="background: var(--event-obrigacao);"></span>
      <span class="ico" style="background: var(--event-obrigacao);">OB</span>
      <div class="meta"><span class="t">Obrigação</span><span class="s">--event-obrigacao</span></div>
      <span class="hit">palette-2</span>
    </div>
    <div class="event">
      <span class="bar" style="background: var(--event-pericia);"></span>
      <span class="ico" style="background: var(--event-pericia);">PE</span>
      <div class="meta"><span class="t">Perícia</span><span class="s">--event-pericia</span></div>
      <span class="hit">palette-13</span>
    </div>
    <div class="event">
      <span class="bar" style="background: var(--event-agenda);"></span>
      <span class="ico" style="background: var(--event-agenda);">AG</span>
      <div class="meta"><span class="t">Agenda</span><span class="s">--event-agenda</span></div>
      <span class="hit">palette-12</span>
    </div>
  </div>
</div>
</body>
</html>
